name: iOS Release Build

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number'
        required: false
        default: '1'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Set up App Store Connect API Key
        env:
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "$APP_STORE_CONNECT_KEY_BASE64" | base64 -D > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          echo "Key file created:"
          wc -c ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          head -1 ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          tail -1 ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Build Flutter iOS (no codesign)
        run: flutter build ios --release --no-codesign --build-number=${{ github.event.inputs.build_number }}

      - name: Install Fastlane
        run: |
          cd ios
          gem install bundler
          bundle install

      - name: Build and Upload with Fastlane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_PATH: ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
        run: |
          cd ios
          bundle exec fastlane release

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fleet-checker-ios
          path: build/ios/ipa/*.ipa
