name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number'
        required: false
        default: '1'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Set up signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 --decode > android/app/fleet-checker.keystore
          echo "$KEY_PROPERTIES" > android/key.properties

      - name: Build AAB
        run: flutter build appbundle --release --build-number=${{ github.event.inputs.build_number }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: fleet-checker-android
          path: build/app/outputs/bundle/release/*.aab
